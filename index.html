<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAK MALL</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
scroll-behavior:smooth;
}

body{
background:#f5f5f5;
overflow-x:hidden;
}

/* NAVBAR */

.navbar{
width:100%;
background:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 60px;
box-shadow:0 3px 15px rgba(0,0,0,.08);
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:32px;
font-weight: 200;
}

.logo span{
color:#61c438;
}

.menu{
display:flex;
gap:40px;
}

.menu a{
text-decoration:none;
font-weight: bold;
font-size:20px;
color:#111;
transition:.3s;
font-family: 'Times New Roman', Times, serif;
}

.menu a:hover{
color:#61c438;
}

.icons{
display:flex;
gap:25px;
font-size:24px;
cursor:pointer;
}

.icons i:hover{
color:#61c438;
}

/* HERO */

.hero{

display:flex;
justify-content:space-between;
align-items:center;

padding:70px;

height:90vh;
height:auto;
background:
linear-gradient(rgba(0,18,60,.78),rgba(0,18,60,.78)),
url("https://images.unsplash.com/photo-1486406146926-c627a92ad1ab");

background-size:cover;
background-position:center;

color:#fff;

}

.hero-content{

width:48%;

}

.hero-content h2{

font-size:55px;
margin-bottom:20px;

}

.hero-content h1{

font-size:100px;
margin-bottom:15px;

}

.green{

color:#79d62f;

}

.hero-content p{

font-size:32px;
line-height:1.5;

}

/* BUTTONS */

.buttons{

margin-top:40px;

}

.btn{

padding:18px 38px;
font-size:20px;
border:none;
cursor:pointer;
border-radius:8px;
transition:.4s;
margin-right:15px;

}

.shop{

background:#79d62f;
color:#fff;

}

.shop:hover{

transform:translateY(-5px);

}

.offer{

background:transparent;
color:#fff;
border:2px solid #fff;

}

.offer:hover{

background:#fff;
color:#000;

}

/* IMAGE */

.hero-image{

width:45%;
display:flex;
justify-content:center;

}

.hero-image img{

width:100%;
max-width:650px;

border-radius:20px;

box-shadow:0 20px 45px rgba(0,0,0,.55);

animation:float 3s ease-in-out infinite;

}

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-18px);
}

100%{
transform:translateY(0px);
}

}

/* FEATURES */

.features{

display:flex;
justify-content:center;
gap:40px;

background:#06193c;

padding:40px;

color:#fff;

}

.feature{

width:280px;

padding:30px;

text-align:center;

background:rgba(255,255,255,.08);

border-radius:15px;

transition:.4s;

}

.feature:hover{

transform:translateY(-10px);

background:#79d62f;

}

.feature h3{

margin-bottom:10px;
font-size:25px;

}

.feature p{

font-size:18px;

}
/* ========================= */
/* RESPONSIVE DESIGN */
/* ========================= */

/* Large Tablets */
@media (max-width:1024px){

.navbar{
padding:18px 30px;
}

.menu{
gap:20px;
}

.hero{
padding:40px;
}

.hero-content h2{
font-size:42px;
}

.hero-content h1{
font-size:75px;
}

.hero-content p{
font-size:24px;
}

.hero-image img{
max-width:500px;
}

.features{
flex-wrap:wrap;
}

}


/* Tablets */
@media (max-width:768px){

.navbar{
flex-direction:column;
gap:15px;
padding:20px;
}

.menu{
flex-wrap:wrap;
justify-content:center;
gap:18px;
}

.menu a{
font-size:18px;
}

.icons{
font-size:22px;
}

.hero{
flex-direction:column-reverse;
text-align:center;
height:auto;
padding:50px 25px;
}

.hero-content{
width:100%;
}

.hero-image{
width:100%;
margin-bottom:35px;
}

.hero-image img{
width:90%;
max-width:450px;
}

.hero-content h2{
font-size:34px;
}

.hero-content h1{
font-size:58px;
}

.hero-content p{
font-size:22px;
}

.buttons{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:15px;
}

.btn{
margin:0;
}

.features{
flex-direction:column;
align-items:center;
padding:30px 20px;
}

.feature{
width:100%;
max-width:420px;
}

}


/* Mobile */
@media (max-width:480px){

.navbar{
padding:15px;
}

.logo{
font-size:28px;
}

.menu{
gap:12px;
}

.menu a{
font-size:16px;
}

.icons{
font-size:20px;
gap:15px;
}

.hero{
padding:35px 15px;
}

.hero-image img{
width:100%;
}

.hero-content h2{
font-size:26px;
}

.hero-content h1{
font-size:42px;
}

.hero-content p{
font-size:18px;
}

.btn{
width:100%;
font-size:17px;
padding:15px;
}

.feature{
padding:20px;
}

.feature h3{
font-size:22px;
}

.feature p{
font-size:16px;
}

}
img{
max-width:100%;
height:auto;
}

@media(max-width:768px){

.hero{
flex-direction:column-reverse;
height:auto;
padding:40px 20px;
text-align:center;
}

.hero-content,
.hero-image{
width:100%;
}

.hero-content h1{
font-size:55px;
}

.hero-content h2{
font-size:30px;
}

.hero-content p{
font-size:20px;
}

.features{
flex-direction:column;
align-items:center;
}

.feature{
width:100%;
max-width:400px;
}

}

@media(max-width:480px){

.hero-content h1{
font-size:40px;
}

.hero-content h2{
font-size:22px;
}

.hero-content p{
font-size:16px;
}

.btn{
width:100%;
margin-bottom:10px;
}

.menu{
gap:10px;
}

.menu a{
font-size:15px;
}

}

</style>
</head>

<body>

<nav class="navbar">

<div class="logo">
<span>PAK</span> MALL
</div>

<div class="menu">

<a href="index.html">Home</a>
<a href="Prducts.html">Shop</a>
<a href="Special Offer.html">Special Offer</a>

</div>

<div class="icons">

<i class="fas fa-search"></i>

<i class="fas fa-user"></i>

<i class="fas fa-shopping-cart"></i>

</div>

</nav>

<section class="hero">

<div class="hero-content">

<h2>Welcome To</h2>

<h1>

<span class="green">PAK</span> MALL

</h1>

<p>

Everyday Shopping,<br>

Better Living

</p>

<div class="buttons">

<a href="Prducts.html"><button class="btn shop">

SHOP NOW

</button></a>

<a href="Special Offer.html"><button class="btn offer">

EXPLORE OFFERS

</button></a>

</div>

</div>

<div class="hero-image">

<!-- Apni image ka naam yahan likhen -->
<img src="PAK Mall.png">

</div>

</section>

<section class="features">

<div class="feature">

<h3>100% Original</h3>

<p>Premium Quality Products</p>

</div>

<div class="feature">

<h3>Fast Delivery</h3>

<p>All Over Pakistan</p>

</div>

<div class="feature">

<h3>Secure Payment</h3>

<p>Safe & Trusted</p>

</div>

</section>
